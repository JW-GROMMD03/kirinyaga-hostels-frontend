<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - Kirinyaga Hostels</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' fill='%23006747'/%3E%3Ctext x='10' y='70' fill='%23FFD700' font-size='60' font-family='Arial' font-weight='bold'%3EKyU%3C/text%3E%3C/svg%3E">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, sans-serif;
        }
        :root {
            --kyu-green: #006747;
            --kyu-gold: #FFD700;
            --bg-white: #ffffff;
            --text-primary: #1e293b;
            --text-secondary: #64748b;
            --border-light: #e2e8f0;
            --shadow-sm: 0 4px 6px -1px rgba(0,0,0,0.1);
            --shadow-md: 0 10px 15px -3px rgba(0,0,0,0.1);
            --danger: #dc2626;
            --warning: #ca8a04;
        }
        body.dark-mode {
            --kyu-green: #2ecc71;
            --kyu-gold: #f1c40f;
            --bg-white: #1e293b;
            --text-primary: #f1f5f9;
            --text-secondary: #cbd5e1;
            --border-light: #334155;
        }
        body {
            background: linear-gradient(145deg, #0b3b2a 0%, #1a4f3a 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            transition: background 0.3s ease;
            position: relative;
        }
        body::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" opacity="0.05"><path d="M20 20 L80 20 L80 80 L20 80 Z" fill="none" stroke="white" stroke-width="2"/><circle cx="50" cy="50" r="15" fill="none" stroke="white" stroke-width="2"/></svg>') repeat;
            pointer-events: none;
        }
        .top-bar {
            background: rgba(255,255,255,0.98);
            backdrop-filter: blur(10px);
            padding: 0.6rem 2rem;
            box-shadow: 0 4px 20px rgba(0,0,0,0.15);
            border-bottom: 3px solid var(--kyu-gold);
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: relative;
            z-index: 10;
        }
        body.dark-mode .top-bar {
            background: rgba(30,41,59,0.98);
        }
        .back-btn {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            text-decoration: none;
            color: var(--kyu-green);
            font-weight: 600;
            font-size: 0.9rem;
            padding: 6px 14px;
            border-radius: 40px;
            background: rgba(0,103,71,0.1);
            transition: all 0.3s ease;
        }
        body.dark-mode .back-btn {
            background: rgba(46,204,113,0.1);
        }
        .back-btn:hover {
            background: var(--kyu-green);
            color: white;
            transform: translateX(-5px);
        }
        .back-btn span {
            font-size: 1.3rem;
            line-height: 1;
        }
        .dark-mode-toggle {
            background: rgba(0,103,71,0.1);
            border: none;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 1.1rem;
            color: var(--kyu-green);
            transition: all 0.3s;
        }
        .dark-mode-toggle:hover {
            background: var(--kyu-green);
            color: white;
            transform: rotate(15deg);
        }
        .container {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 1rem;
            position: relative;
            z-index: 5;
        }
        .login-card {
            background: var(--bg-white);
            backdrop-filter: blur(20px);
            border-radius: 28px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
            padding: 1.5rem 2rem;
            width: 100%;
            max-width: 440px;
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            border: 1px solid rgba(255, 215, 0, 0.2);
        }
        .login-card:hover {
            transform: translateY(-5px);
        }
        .university-emblem {
            text-align: center;
            margin-bottom: 0.8rem;
        }
        .university-emblem img {
            width: 60px;
            height: 60px;
            filter: drop-shadow(0 4px 6px rgba(0,0,0,0.2));
        }
        h2 {
            color: var(--kyu-green);
            font-size: 1.7rem;
            text-align: center;
            margin-bottom: 0.2rem;
        }
        .subtitle {
            text-align: center;
            color: var(--text-secondary);
            margin-bottom: 1.2rem;
            border-bottom: 2px solid var(--kyu-gold);
            padding-bottom: 0.6rem;
            display: inline-block;
            width: auto;
            margin-left: auto;
            margin-right: auto;
            display: table;
            font-size: 0.9rem;
        }
        .form-group {
            margin-bottom: 1rem;
        }
        label {
            display: block;
            font-weight: 600;
            margin-bottom: 0.3rem;
            color: var(--text-primary);
            font-size: 0.85rem;
        }
        input {
            width: 100%;
            padding: 0.8rem 1rem;
            border: 2px solid var(--border-light);
            border-radius: 14px;
            font-size: 0.95rem;
            transition: all 0.3s;
            background: var(--bg-white);
            color: var(--text-primary);
        }
        input:focus {
            outline: none;
            border-color: var(--kyu-green);
            box-shadow: 0 0 0 3px rgba(0, 103, 71, 0.2);
        }
        input:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            background: var(--border-light);
        }
        .otp-group {
            display: flex;
            gap: 6px;
            justify-content: center;
            margin-top: 0.3rem;
        }
        .otp-input {
            width: 45px;
            height: 50px;
            text-align: center;
            font-size: 1.5rem;
            font-weight: 700;
            border: 2px solid var(--border-light);
            border-radius: 10px;
            background: var(--bg-white);
            color: var(--text-primary);
        }
        .otp-input:focus {
            border-color: var(--kyu-green);
            outline: none;
        }
        .remember-forgot {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin: 1rem 0;
            flex-wrap: wrap;
            gap: 8px;
        }
        .remember-me {
            display: flex;
            align-items: center;
            gap: 6px;
            color: var(--text-secondary);
            cursor: pointer;
            font-size: 0.9rem;
        }
        .remember-me input[type="checkbox"] {
            width: 16px;
            height: 16px;
            accent-color: var(--kyu-green);
            cursor: pointer;
        }
        .forgot-password a {
            color: var(--kyu-green);
            text-decoration: none;
            font-weight: 600;
            font-size: 0.85rem;
            padding: 4px 8px;
            border-radius: 20px;
            background: rgba(0, 103, 71, 0.08);
            transition: all 0.3s;
        }
        .forgot-password a:hover {
            background: var(--kyu-green);
            color: white;
        }
        .btn-login {
            width: 100%;
            padding: 0.9rem;
            background: linear-gradient(145deg, var(--kyu-green), #008355);
            color: white;
            border: none;
            border-radius: 40px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 6px 15px rgba(0, 103, 71, 0.4);
        }
        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(0, 103, 71, 0.6);
        }
        .btn-login:disabled {
            opacity: 0.7;
            cursor: not-allowed;
            transform: none;
        }
        .spinner {
            display: none;
            width: 35px;
            height: 35px;
            margin: 10px auto 0;
            border: 3px solid rgba(0, 103, 71, 0.2);
            border-left-color: var(--kyu-green);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        .error-message {
            background: #fed7d7;
            color: #c53030;
            padding: 0.7rem;
            border-radius: 12px;
            margin-bottom: 1rem;
            display: none;
            font-size: 0.85rem;
            border-left: 4px solid #c53030;
        }
        body.dark-mode .error-message {
            background: #7f1a1a;
            color: #fecaca;
        }
        .info-message {
            background: #e6f7e6;
            color: #2e7d32;
            padding: 0.7rem;
            border-radius: 12px;
            margin-bottom: 1rem;
            display: none;
            font-size: 0.85rem;
            border-left: 4px solid #2e7d32;
        }
        body.dark-mode .info-message {
            background: #14532d;
            color: #86efac;
        }
        .lockout-message {
            background: #fef3c7;
            color: #b45309;
            padding: 0.7rem;
            border-radius: 12px;
            margin-bottom: 1rem;
            display: none;
            text-align: center;
            border-left: 4px solid #b45309;
        }
        body.dark-mode .lockout-message {
            background: #78350f;
            color: #fde047;
        }
        .rate-limit-message {
            background: #fef3c7;
            color: #b45309;
            padding: 0.7rem;
            border-radius: 12px;
            margin-bottom: 1rem;
            display: none;
            text-align: center;
            border-left: 4px solid #b45309;
        }
        body.dark-mode .rate-limit-message {
            background: #78350f;
            color: #fde047;
        }
        .countdown-timer {
            font-size: 1.1rem;
            font-weight: bold;
            font-family: monospace;
            margin-top: 0.3rem;
        }
        .attempts-warning {
            font-size: 0.8rem;
            margin-top: -0.3rem;
            margin-bottom: 0.5rem;
            padding: 0.4rem;
            border-radius: 8px;
            display: none;
            text-align: center;
        }
        .attempts-warning.warning {
            background: rgba(202, 138, 4, 0.1);
            color: var(--warning);
        }
        .attempts-warning.danger {
            background: rgba(220, 38, 38, 0.1);
            color: var(--danger);
        }
        .admin-badge {
            text-align: center;
            margin-top: 1rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
        }
        .admin-badge i {
            color: var(--kyu-green);
        }
        footer {
            background: #1a2e3a;
            color: #e2e8f0;
            padding: 0.8rem;
            text-align: center;
            font-size: 0.8rem;
            position: relative;
            z-index: 10;
            border-top: 2px solid var(--kyu-gold);
        }
        body.dark-mode footer {
            background: #0f172a;
        }
        footer a {
            color: var(--kyu-gold);
            text-decoration: none;
            margin: 0 8px;
        }
        footer a:hover {
            text-decoration: underline;
        }
        @media (max-width: 600px) {
            .login-card {
                padding: 1.2rem 1.5rem;
            }
            h2 {
                font-size: 1.5rem;
            }
            .otp-input {
                width: 40px;
                height: 45px;
                font-size: 1.3rem;
            }
        }
    </style>
</head>

    <script>
        (function() {
            // ==================== DARK MODE SYNC ====================
            function applyDarkMode() {
                const savedTheme = localStorage.getItem('ownerTheme');
                if (savedTheme === 'dark') {
                    document.body.classList.add('dark-mode');
                    const toggleBtn = document.getElementById('darkModeToggle');
                    if (toggleBtn) toggleBtn.innerHTML = '<i class="fas fa-sun"></i>';
                } else {
                    document.body.classList.remove('dark-mode');
                    const toggleBtn = document.getElementById('darkModeToggle');
                    if (toggleBtn) toggleBtn.innerHTML = '<i class="fas fa-moon"></i>';
                }
            }
            
            applyDarkMode();
            
            window.addEventListener('storage', (e) => {
                if (e.key === 'ownerTheme') applyDarkMode();
            });

            document.getElementById('darkModeToggle').addEventListener('click', () => {
                const isDark = document.body.classList.toggle('dark-mode');
                localStorage.setItem('ownerTheme', isDark ? 'dark' : 'light');
                const toggleBtn = document.getElementById('darkModeToggle');
                toggleBtn.innerHTML = isDark ? '<i class="fas fa-sun"></i>' : '<i class="fas fa-moon"></i>';
            });

            // ==================== ADMIN LOGIN FUNCTIONALITY ====================
            const API_BASE = 'https://kirinyaga-hostels-backend.onrender.com/api';
            
            const form = document.getElementById('login-form');
            const email = document.getElementById('email');
            const password = document.getElementById('password');
            const otpGroup = document.getElementById('otp-group');
            const otpInputs = document.querySelectorAll('.otp-input');
            const otpHidden = document.getElementById('otp');
            const remember = document.getElementById('remember');
            const loginBtn = document.getElementById('login-btn');
            const spinner = document.getElementById('spinner');
            const errorDiv = document.getElementById('error-message');
            const infoDiv = document.getElementById('info-message');
            const lockoutDiv = document.getElementById('lockout-message');
            const rateLimitDiv = document.getElementById('rate-limit-message');
            const attemptsWarning = document.getElementById('attempts-warning');
            const resendBtn = document.getElementById('resend-otp-btn');
            
            let otpTimer = null;
            let lockoutTimer = null;
            let rateLimitTimer = null;

            function safeGetErrorMessage(error) {
                if (typeof error === 'string') return error;
                if (typeof error === 'object' && error !== null) {
                    if (error.message) return error.message;
                    if (error.error) return error.error;
                    if (error.detail) return error.detail;
                    return JSON.stringify(error);
                }
                return 'Unknown error occurred';
            }

            function showError(message) {
                errorDiv.innerHTML = `<i class="fas fa-exclamation-circle"></i> ${message}`;
                errorDiv.style.display = 'block';
                infoDiv.style.display = 'none';
                lockoutDiv.style.display = 'none';
                rateLimitDiv.style.display = 'none';
                setTimeout(() => {
                    if (errorDiv.style.display === 'block') {
                        errorDiv.style.display = 'none';
                    }
                }, 5000);
            }

            function showInfo(message, isSuccess = false) {
                infoDiv.innerHTML = `<i class="fas fa-${isSuccess ? 'check-circle' : 'info-circle'}"></i> ${message}`;
                infoDiv.style.display = 'block';
                errorDiv.style.display = 'none';
                lockoutDiv.style.display = 'none';
                rateLimitDiv.style.display = 'none';
                setTimeout(() => {
                    if (infoDiv.style.display === 'block') {
                        infoDiv.style.display = 'none';
                    }
                }, 5000);
            }

            function showLockout(message, remainingSeconds) {
                lockoutDiv.style.display = 'block';
                errorDiv.style.display = 'none';
                infoDiv.style.display = 'none';
                rateLimitDiv.style.display = 'none';
                attemptsWarning.style.display = 'none';
                
                if (lockoutTimer) clearInterval(lockoutTimer);
                
                const startTime = Date.now();
                const endTime = startTime + (remainingSeconds * 1000);
                
                function updateCountdown() {
                    const now = Date.now();
                    const remaining = Math.max(0, Math.floor((endTime - now) / 1000));
                    
                    if (remaining <= 0) {
                        clearInterval(lockoutTimer);
                        lockoutTimer = null;
                        lockoutDiv.style.display = 'none';
                        loginBtn.disabled = false;
                        email.disabled = false;
                        password.disabled = false;
                        lockoutDiv.innerHTML = '';
                        showInfo('Account unlocked. You can now try logging in again.', true);
                        return;
                    }
                    
                    const hours = Math.floor(remaining / 3600);
                    const minutes = Math.floor((remaining % 3600) / 60);
                    const seconds = remaining % 60;
                    
                    let timeString = '';
                    if (hours > 0) {
                        timeString = `${hours}h ${minutes}m ${seconds}s`;
                    } else if (minutes > 0) {
                        timeString = `${minutes}m ${seconds}s`;
                    } else {
                        timeString = `${seconds}s`;
                    }
                    
                    lockoutDiv.innerHTML = `
                        <i class="fas fa-clock"></i> ${message}<br>
                        <div class="countdown-timer">${timeString}</div>
                    `;
                }
                
                updateCountdown();
                lockoutTimer = setInterval(updateCountdown, 1000);
                
                loginBtn.disabled = true;
                email.disabled = true;
                password.disabled = true;
            }

function showRateLimit(data) {
    // Clear any existing timer
    if (rateLimitTimer) clearInterval(rateLimitTimer);
    
    let message = 'Too many login attempts.';
    let lockoutSeconds = 300; // Default 5 minutes
    
    // Check if we have lockout info from the response
    if (data && data.locked === true) {
        if (data.remaining_seconds) {
            lockoutSeconds = data.remaining_seconds;
        }
        if (data.lockout_hours) {
            lockoutSeconds = data.lockout_hours * 3600;
        }
        message = data.error || data.message || `Account locked. Please try again later.`;
    } else {
        message = 'Too many login attempts. Please wait before trying again.';
    }
    
    // Format initial time
    const hours = Math.floor(lockoutSeconds / 3600);
    const minutes = Math.floor((lockoutSeconds % 3600) / 60);
    const seconds = lockoutSeconds % 60;
    
    let timeString = '';
    if (hours > 0) {
        timeString = `${hours}h ${minutes}m ${seconds}s`;
    } else if (minutes > 0) {
        timeString = `${minutes}m ${seconds}s`;
    } else {
        timeString = `${seconds}s`;
    }
    
    rateLimitDiv.innerHTML = `
        <i class="fas fa-clock"></i> ${message}<br>
        <div class="countdown-timer" id="rate-countdown">${timeString}</div>
    `;
    rateLimitDiv.style.display = 'block';
    errorDiv.style.display = 'none';
    infoDiv.style.display = 'none';
    lockoutDiv.style.display = 'none';
    loginBtn.disabled = true;
    email.disabled = true;
    password.disabled = true;
    
    let remaining = lockoutSeconds;
    rateLimitTimer = setInterval(() => {
        remaining--;
        if (remaining <= 0) {
            clearInterval(rateLimitTimer);
            rateLimitTimer = null;
            rateLimitDiv.style.display = 'none';
            loginBtn.disabled = false;
            email.disabled = false;
            password.disabled = false;
            showInfo('You can now try logging in again.', true);
        } else {
            const hrs = Math.floor(remaining / 3600);
            const mins = Math.floor((remaining % 3600) / 60);
            const secs = remaining % 60;
            const countdownEl = document.getElementById('rate-countdown');
            
            let displayTime = '';
            if (hrs > 0) {
                displayTime = `${hrs}h ${mins}m ${secs}s`;
            } else if (mins > 0) {
                displayTime = `${mins}m ${secs}s`;
            } else {
                displayTime = `${secs}s`;
            }
            
            if (countdownEl) countdownEl.textContent = displayTime;
        }
    }, 1000);
}

            function showAttemptsWarning(attemptsLeft) {
                attemptsWarning.style.display = 'block';
                if (attemptsLeft === 1) {
                    attemptsWarning.className = 'attempts-warning danger';
                    attemptsWarning.innerHTML = `<i class="fas fa-exclamation-triangle"></i> ⚠️ WARNING: 1 attempt remaining before account lockout for 1 hour!`;
                } else {
                    attemptsWarning.className = 'attempts-warning warning';
                    attemptsWarning.innerHTML = `<i class="fas fa-info-circle"></i> ⏰ ${attemptsLeft} attempts remaining before lockout.`;
                }
                setTimeout(() => {
                    attemptsWarning.style.display = 'none';
                }, 5000);
            }

            function getOtp() {
                return Array.from(otpInputs).map(i => i.value).join('');
            }

            function resetOtp() {
                otpInputs.forEach(input => input.value = '');
                otpHidden.value = '';
            }

            function startOtpTimer(expirySeconds = 600) {
                const timerElement = document.getElementById('otp-timer');
                if (otpTimer) clearInterval(otpTimer);
                
                const otpExpiryTime = Date.now() + (expirySeconds * 1000);
                
                function updateTimer() {
                    const now = Date.now();
                    const remainingSecs = Math.max(0, Math.floor((otpExpiryTime - now) / 1000));
                    
                    if (remainingSecs <= 0) {
                        clearInterval(otpTimer);
                        otpTimer = null;
                        if (timerElement) timerElement.textContent = '';
                        if (resendBtn) resendBtn.style.display = 'inline-block';
                    } else {
                        const minutes = Math.floor(remainingSecs / 60);
                        const seconds = remainingSecs % 60;
                        if (timerElement) timerElement.textContent = `(expires in ${minutes}:${seconds.toString().padStart(2, '0')})`;
                        if (resendBtn) resendBtn.style.display = 'none';
                    }
                }
                
                updateTimer();
                otpTimer = setInterval(updateTimer, 1000);
            }

            function showOtpField() {
                otpGroup.style.display = 'block';
                resetOtp();
                setTimeout(() => {
                    otpGroup.scrollIntoView({ behavior: 'smooth', block: 'center' });
                    otpInputs[0].focus();
                }, 100);
            }

            function hideOtpField() {
                otpGroup.style.display = 'none';
                resetOtp();
                if (otpTimer) {
                    clearInterval(otpTimer);
                    otpTimer = null;
                }
            }

            otpInputs.forEach((input, idx) => {
                input.addEventListener('input', (e) => {
                    e.target.value = e.target.value.replace(/[^0-9]/g, '');
                    if (e.target.value && idx < otpInputs.length - 1) {
                        otpInputs[idx + 1].focus();
                    }
                    otpHidden.value = getOtp();
                    
                    if (getOtp().length === 6) {
                        setTimeout(() => {
                            form.dispatchEvent(new Event('submit'));
                        }, 100);
                    }
                });

                input.addEventListener('keydown', (e) => {
                    if (e.key === 'Backspace' && !e.target.value && idx > 0) {
                        otpInputs[idx - 1].focus();
                    }
                });

                input.addEventListener('paste', (e) => {
                    e.preventDefault();
                    const paste = e.clipboardData.getData('text').replace(/[^0-9]/g, '');
                    for (let i = 0; i < paste.length && i < otpInputs.length; i++) {
                        otpInputs[i].value = paste[i];
                    }
                    otpHidden.value = paste.substring(0, 6);
                    if (paste.length >= 6) {
                        otpInputs[5].focus();
                        setTimeout(() => {
                            form.dispatchEvent(new Event('submit'));
                        }, 100);
                    }
                });
            });

            if (resendBtn) {
                resendBtn.addEventListener('click', async () => {
                    resendBtn.disabled = true;
                    resendBtn.innerHTML = '<i class="fas fa-spinner fa-pulse"></i> Sending...';
                    
                    try {
                        const payload = { email: email.value };
                        const res = await fetch(`${API_BASE}/auth/2fa/send-otp/`, {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify(payload)
                        });
                        
                        if (res.ok) {
                            showInfo('New verification code sent to your email!', true);
                            startOtpTimer(600);
                        } else {
                            const data = await res.json();
                            showError(data.message || 'Failed to resend code. Please try again.');
                        }
                    } catch (err) {
                        showError('Network error. Please try again.');
                    } finally {
                        resendBtn.disabled = false;
                        resendBtn.innerHTML = '<i class="fas fa-redo-alt"></i> Didn\'t receive code? Resend';
                    }
                });
            }

            function isOnline() {
                return navigator.onLine;
            }

            form.addEventListener('submit', async (e) => {
                e.preventDefault();

                if (!isOnline()) {
                    showError('📡 No internet connection. Please check your network and try again.');
                    return;
                }

                const payload = {
                    email: email.value,
                    password: password.value,
                    remember: remember.checked
                };

                const otpCode = getOtp();
                if (otpGroup.style.display === 'block' && otpCode.length === 6) {
                    payload.otp_token = otpCode;
                }

                loginBtn.disabled = true;
                spinner.style.display = 'block';
                errorDiv.style.display = 'none';
                infoDiv.style.display = 'none';
                lockoutDiv.style.display = 'none';
                rateLimitDiv.style.display = 'none';

                const controller = new AbortController();
                const timeoutId = setTimeout(() => controller.abort(), 30000);

                try {
                    const res = await fetch(`${API_BASE}/auth/admin/login/`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        credentials: 'include',
                        body: JSON.stringify(payload),
                        signal: controller.signal
                    });

                    clearTimeout(timeoutId);

                    if (res.status === 429) {
                        showRateLimit(data);
                        spinner.style.display = 'none';
                        return;
                    }

                    const data = await res.json();

                    if (!res.ok) {
                        let requiresOtp = false;
                        let errorMsg = '';
                        let isBlocked = false;
                        let isLocked = false;
                        let lockedMessage = '';
                        let remainingSeconds = 0;
                        
                        if (data.blocked === true) {
                            isBlocked = true;
                            errorMsg = data.message || 'Your admin account has been disabled. Please contact the system administrator.';
                        }
                        
                        if (data.locked === true) {
                            isLocked = true;
                            lockedMessage = data.message || 'Account temporarily locked.';
                            remainingSeconds = data.remaining_seconds || 0;
                        }
                        
                        if (data.non_field_errors && Array.isArray(data.non_field_errors) && data.non_field_errors.length > 0) {
                            const firstError = data.non_field_errors[0];
                            
                            if (typeof firstError === 'object' && firstError !== null) {
                                if (firstError.requires_otp === true || firstError.requires_otp === "True") {
                                    requiresOtp = true;
                                    errorMsg = firstError.message || 'Verification code sent to your email';
                                }
                                if (firstError.blocked === true) {
                                    isBlocked = true;
                                    errorMsg = firstError.message || 'Account blocked.';
                                }
                                if (firstError.locked === true) {
                                    isLocked = true;
                                    lockedMessage = firstError.message || 'Account locked.';
                                    remainingSeconds = firstError.remaining_seconds || 0;
                                }
                            } else if (typeof firstError === 'string') {
                                errorMsg = firstError;
                                const lowerMsg = errorMsg.toLowerCase();
                                if (lowerMsg.includes('otp') || 
                                    lowerMsg.includes('verification') ||
                                    lowerMsg.includes('code sent')) {
                                    requiresOtp = true;
                                }
                                if (lowerMsg.includes('blocked')) {
                                    isBlocked = true;
                                }
                            }
                        }
                        
                        if (data.requires_otp === true || data.requires_otp === "True") {
                            requiresOtp = true;
                            errorMsg = data.message || 'Verification code required';
                        }
                        
                        if (isBlocked) {
                            showError(errorMsg);
                            loginBtn.disabled = true;
                            email.disabled = true;
                            password.disabled = true;
                            spinner.style.display = 'none';
                            return;
                        }
                        
                        if (isLocked) {
                            showLockout(lockedMessage, remainingSeconds);
                            spinner.style.display = 'none';
                            return;
                        }
                        
                        if (requiresOtp) {
                            showOtpField();
                            startOtpTimer(600);
                            showInfo('📧 Verification code sent to your email. Please enter it below.');
                            loginBtn.disabled = false;
                            spinner.style.display = 'none';
                            return;
                        }
                        
                        if (data.attempts_left) {
                            showAttemptsWarning(data.attempts_left);
                            showError(`${safeGetErrorMessage(errorMsg) || 'Invalid email or password'} (${data.attempts_left} attempt(s) remaining)`);
                        } else if (typeof errorMsg === 'string' && errorMsg) {
                            showError(errorMsg);
                        } else {
                            showError('❌ Invalid email or password. Please try again.');
                        }
                        loginBtn.disabled = false;
                        spinner.style.display = 'none';
                        return;
                    }

                    if (data.access) {
                        sessionStorage.setItem('accessToken', data.access);
                        if (remember.checked) {
                            localStorage.setItem('accessToken', data.access);
                        }
                    }
                    if (data.refresh) {
                        sessionStorage.setItem('refreshToken', data.refresh);
                        if (remember.checked) {
                            localStorage.setItem('refreshToken', data.refresh);
                        }
                    }
                    
                    if (data.role) {
                        sessionStorage.setItem('userRole', data.role);
                        localStorage.setItem('userRole', data.role);
                    } else {
                        sessionStorage.setItem('userRole', 'admin');
                        localStorage.setItem('userRole', 'admin');
                    }
                    
                    sessionStorage.setItem('userEmail', email.value);
                    localStorage.setItem('userEmail', email.value);
                    
                    showInfo('✅ Admin login successful! Redirecting to admin dashboard...', true);
                    
                    setTimeout(() => {
                        window.location.href = 'dashboard.html';
                    }, 1500);
                    
                } catch (err) {
                    clearTimeout(timeoutId);
                    console.error('Login error:', err);
                    
                    if (err.name === 'AbortError') {
                        showError('⏱️ Request timed out. Server is taking too long to respond. Please try again.');
                    } else if (err.message === 'Failed to fetch') {
                        showError('🔌 Cannot connect to server. Please check your internet connection.');
                    } else {
                        showError('🌐 Network error. Unable to connect to server. Please check your connection and try again.');
                    }
                    loginBtn.disabled = false;
                    spinner.style.display = 'none';
                }
            });

            email.addEventListener('input', () => {
                if (otpGroup.style.display === 'block') {
                    hideOtpField();
                }
            });
            
            password.addEventListener('input', () => {
                if (otpGroup.style.display === 'block') {
                    hideOtpField();
                }
            });

            try {
                const rememberedEmail = localStorage.getItem('rememberedAdminEmail');
                if (rememberedEmail) {
                    email.value = rememberedEmail;
                    remember.checked = true;
                }
            } catch (e) {}

            form.addEventListener('submit', function() {
                if (remember.checked) {
                    try {
                        localStorage.setItem('rememberedAdminEmail', email.value.trim());
                    } catch (e) {}
                } else {
                    try {
                        localStorage.removeItem('rememberedAdminEmail');
                    } catch (e) {}
                }
            });
        })();
    </script>
</body>
</html>
