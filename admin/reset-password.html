<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Reset Password - Kirinyaga Hostels</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' fill='%23006747'/%3E%3Ctext x='10' y='70' fill='%23FFD700' font-size='60' font-family='Arial' font-weight='bold'%3EKyU%3C/text%3E%3C/svg%3E">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, sans-serif;
        }
        :root {
            --kyu-green: #006747;
            --kyu-gold: #FFD700;
            --admin-dark: #1a2639;
        }
        body {
            background: linear-gradient(145deg, var(--admin-dark) 0%, #2c3e50 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        .top-bar {
            background: rgba(255,255,255,0.98);
            backdrop-filter: blur(10px);
            padding: 1rem 2rem;
            box-shadow: 0 4px 20px rgba(0,0,0,0.15);
            border-bottom: 3px solid var(--kyu-gold);
            display: flex;
            align-items: center;
            gap: 20px;
        }
        .back-btn {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            text-decoration: none;
            color: var(--kyu-green);
            font-weight: 600;
            padding: 8px 16px;
            border-radius: 40px;
            background: rgba(0,103,71,0.1);
            transition: all 0.3s;
        }
        .back-btn:hover {
            background: var(--kyu-green);
            color: white;
            transform: translateX(-5px);
        }
        .container {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 2rem;
        }
        .reset-card {
            background: white;
            border-radius: 40px;
            box-shadow: 0 30px 60px rgba(0,0,0,0.3);
            padding: 3rem;
            width: 100%;
            max-width: 450px;
        }
        .admin-badge {
            text-align: center;
            margin-bottom: 1rem;
            color: var(--admin-dark);
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        h2 {
            color: var(--kyu-green);
            font-size: 2rem;
            text-align: center;
            margin-bottom: 0.5rem;
        }
        .subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 2rem;
            border-bottom: 2px solid var(--kyu-gold);
            padding-bottom: 1rem;
        }
        .form-group {
            margin-bottom: 1.5rem;
        }
        label {
            display: block;
            font-weight: 600;
            margin-bottom: 0.5rem;
            color: #333;
        }
        input {
            width: 100%;
            padding: 1rem;
            border: 2px solid #e2e8f0;
            border-radius: 16px;
            font-size: 1rem;
            transition: border-color 0.3s;
        }
        input:focus {
            outline: none;
            border-color: var(--kyu-green);
        }
        .password-strength {
            margin-top: 8px;
            height: 6px;
            background: #e2e8f0;
            border-radius: 10px;
            overflow: hidden;
        }
        .strength-bar {
            height: 100%;
            width: 0%;
            transition: width 0.3s, background 0.3s;
        }
        .strength-text {
            font-size: 0.8rem;
            margin-top: 4px;
            color: #718096;
        }
        .btn-reset {
            width: 100%;
            padding: 1.1rem;
            background: linear-gradient(145deg, var(--kyu-green), #008355);
            color: white;
            border: none;
            border-radius: 40px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 8px 20px rgba(0,103,71,0.4);
            margin-top: 1rem;
        }
        .btn-reset:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 25px rgba(0,103,71,0.6);
        }
        .btn-reset:disabled {
            opacity: 0.7;
            cursor: not-allowed;
        }
        .spinner {
            display: none;
            width: 40px;
            height: 40px;
            margin: 1rem auto;
            border: 4px solid rgba(0,0,0,0.1);
            border-left-color: var(--kyu-green);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        .message {
            padding: 1rem;
            border-radius: 16px;
            margin-bottom: 1.5rem;
            display: none;
        }
        .message.success {
            background: #c6f6d5;
            color: #22543d;
            border-left: 5px solid #22543d;
        }
        .message.error {
            background: #fed7d7;
            color: #c53030;
            border-left: 5px solid #c53030;
        }
        .login-link {
            text-align: center;
            margin-top: 2rem;
        }
        .login-link a {
            color: var(--kyu-green);
            font-weight: 600;
            text-decoration: none;
        }
        footer {
            background: #1a2e3a;
            color: #e2e8f0;
            padding: 1.5rem;
            text-align: center;
            border-top: 3px solid var(--kyu-gold);
        }
    </style>
</head>
<body>
    <div class="top-bar">
        <a href="login.html" class="back-btn">
            <span>←</span> Back to Login
        </a>
    </div>

    <div class="container">
        <div class="reset-card">
            <div class="admin-badge">🔐 ADMIN PORTAL</div>
            
            <h2>Set New Password</h2>
            <div class="subtitle">Enter your new password below</div>

            <div id="message" class="message"></div>

            <form id="reset-form">
                <div class="form-group">
                    <label>New Password</label>
                    <input type="password" id="new_password" placeholder="Enter new password" required minlength="8">
                    <div class="password-strength">
                        <div class="strength-bar" id="strengthBar"></div>
                    </div>
                    <div class="strength-text" id="strengthText"></div>
                </div>

                <div class="form-group">
                    <label>Confirm New Password</label>
                    <input type="password" id="confirm_password" placeholder="Re-enter new password" required>
                </div>

                <button type="submit" class="btn-reset" id="reset-btn">Reset Password</button>
                <div class="spinner" id="spinner"></div>
            </form>

            <div class="login-link">
                <a href="login.html">Back to Login</a>
            </div>
        </div>
    </div>

    <footer>
        <p>© 2025 Kirinyaga University Hostels. All rights reserved.</p>
    </footer>

    <script>
        (function() {
            const API_BASE_URL = 'https://kirinyaga-hostels-backend.onrender.com/api';
            const urlParams = new URLSearchParams(window.location.search);
            const token = urlParams.get('token');
            const email = urlParams.get('email');

            if (!token || !email) {
                document.getElementById('message').textContent = 'Invalid password reset link.';
                document.getElementById('message').className = 'message error';
                document.getElementById('message').style.display = 'block';
                document.getElementById('reset-btn').disabled = true;
            }

            const form = document.getElementById('reset-form');
            const newPass = document.getElementById('new_password');
            const confirmPass = document.getElementById('confirm_password');
            const resetBtn = document.getElementById('reset-btn');
            const spinner = document.getElementById('spinner');
            const messageDiv = document.getElementById('message');
            const strengthBar = document.getElementById('strengthBar');
            const strengthText = document.getElementById('strengthText');

            // Password strength meter
            newPass.addEventListener('input', function() {
                const password = this.value;
                let strength = 0;
                
                if (password.length >= 8) strength += 25;
                if (password.match(/[a-z]+/)) strength += 25;
                if (password.match(/[A-Z]+/)) strength += 25;
                if (password.match(/[0-9]+/)) strength += 15;
                if (password.match(/[$@#&!]+/)) strength += 10;
                
                strength = Math.min(strength, 100);
                strengthBar.style.width = strength + '%';
                
                if (strength < 30) {
                    strengthBar.style.background = '#e53e3e';
                    strengthText.textContent = 'Weak password';
                    strengthText.style.color = '#e53e3e';
                } else if (strength < 60) {
                    strengthBar.style.background = '#ed8936';
                    strengthText.textContent = 'Moderate password';
                    strengthText.style.color = '#ed8936';
                } else if (strength < 80) {
                    strengthBar.style.background = '#48bb78';
                    strengthText.textContent = 'Strong password';
                    strengthText.style.color = '#48bb78';
                } else {
                    strengthBar.style.background = '#38a169';
                    strengthText.textContent = 'Very strong password';
                    strengthText.style.color = '#38a169';
                }
            });

            form.addEventListener('submit', async (e) => {
                e.preventDefault();

                if (newPass.value !== confirmPass.value) {
                    messageDiv.textContent = 'Passwords do not match.';
                    messageDiv.className = 'message error';
                    messageDiv.style.display = 'block';
                    return;
                }

                resetBtn.disabled = true;
                spinner.style.display = 'block';
                messageDiv.style.display = 'none';

                try {
                    const res = await fetch(`${API_BASE}/password-reset/confirm/`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            email: email,
                            token: token,
                            new_password: newPass.value,
                            new_password_confirm: confirmPass.value
                        })
                    });

                    const data = await res.json();

                    if (res.ok) {
                        messageDiv.textContent = 'Password reset successfully! Redirecting to login...';
                        messageDiv.className = 'message success';
                        messageDiv.style.display = 'block';
                        setTimeout(() => window.location.href = 'login.html', 2000);
                    } else {
                        if (data.non_field_errors) {
                            messageDiv.textContent = data.non_field_errors[0];
                        } else if (data.new_password) {
                            messageDiv.textContent = data.new_password[0];
                        } else {
                            messageDiv.textContent = 'Password reset failed. Please try again.';
                        }
                        messageDiv.className = 'message error';
                        messageDiv.style.display = 'block';
                        resetBtn.disabled = false;
                        spinner.style.display = 'none';
                    }
                } catch (err) {
                    messageDiv.textContent = 'Network error. Please try again.';
                    messageDiv.className = 'message error';
                    messageDiv.style.display = 'block';
                    resetBtn.disabled = false;
                    spinner.style.display = 'none';
                }
            });
        })();
    </script>
</body>
</html>
