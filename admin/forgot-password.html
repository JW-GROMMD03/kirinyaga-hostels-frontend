<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Forgot Password - Kirinyaga Hostels</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' fill='%23006747'/%3E%3Ctext x='10' y='70' fill='%23FFD700' font-size='60' font-family='Arial' font-weight='bold'%3EKyU%3C/text%3E%3C/svg%3E">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, sans-serif;
        }
        :root {
            --kyu-green: #006747;
            --kyu-gold: #FFD700;
            --admin-dark: #1a2639;
        }
        body {
            background: linear-gradient(145deg, var(--admin-dark) 0%, #2c3e50 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        .top-bar {
            background: rgba(255,255,255,0.98);
            backdrop-filter: blur(10px);
            padding: 1rem 2rem;
            box-shadow: 0 4px 20px rgba(0,0,0,0.15);
            border-bottom: 3px solid var(--kyu-gold);
            display: flex;
            align-items: center;
            gap: 20px;
        }
        .back-btn {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            text-decoration: none;
            color: var(--kyu-green);
            font-weight: 600;
            padding: 8px 16px;
            border-radius: 40px;
            background: rgba(0,103,71,0.1);
            transition: all 0.3s;
        }
        .back-btn:hover {
            background: var(--kyu-green);
            color: white;
            transform: translateX(-5px);
        }
        .container {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 2rem;
        }
        .forgot-card {
            background: white;
            border-radius: 40px;
            box-shadow: 0 30px 60px rgba(0,0,0,0.3);
            padding: 3rem;
            width: 100%;
            max-width: 450px;
        }
        .admin-badge {
            text-align: center;
            margin-bottom: 1rem;
            color: var(--admin-dark);
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        h2 {
            color: var(--kyu-green);
            font-size: 2rem;
            text-align: center;
            margin-bottom: 0.5rem;
        }
        .subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 2rem;
            border-bottom: 2px solid var(--kyu-gold);
            padding-bottom: 1rem;
        }
        .info-box {
            background: #e8f4fd;
            color: #0369a1;
            padding: 1rem;
            border-radius: 16px;
            margin-bottom: 2rem;
            font-size: 0.95rem;
            border-left: 5px solid var(--kyu-gold);
        }
        .form-group {
            margin-bottom: 1.5rem;
        }
        label {
            display: block;
            font-weight: 600;
            margin-bottom: 0.5rem;
            color: #333;
        }
        input {
            width: 100%;
            padding: 1rem;
            border: 2px solid #e2e8f0;
            border-radius: 16px;
            font-size: 1rem;
            transition: border-color 0.3s;
        }
        input:focus {
            outline: none;
            border-color: var(--kyu-green);
        }
        .btn-reset {
            width: 100%;
            padding: 1.1rem;
            background: linear-gradient(145deg, var(--kyu-green), #008355);
            color: white;
            border: none;
            border-radius: 40px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 8px 20px rgba(0,103,71,0.4);
        }
        .btn-reset:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 25px rgba(0,103,71,0.6);
        }
        .btn-reset:disabled {
            opacity: 0.7;
            cursor: not-allowed;
        }
        .spinner {
            display: none;
            width: 40px;
            height: 40px;
            margin: 1rem auto;
            border: 4px solid rgba(0,0,0,0.1);
            border-left-color: var(--kyu-green);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        .message {
            padding: 1rem;
            border-radius: 16px;
            margin-bottom: 1.5rem;
            display: none;
        }
        .message.success {
            background: #c6f6d5;
            color: #22543d;
            border-left: 5px solid #22543d;
        }
        .message.error {
            background: #fed7d7;
            color: #c53030;
            border-left: 5px solid #c53030;
        }
        .login-link {
            text-align: center;
            margin-top: 2rem;
        }
        .login-link a {
            color: var(--kyu-green);
            font-weight: 600;
            text-decoration: none;
        }
        .login-link a:hover {
            text-decoration: underline;
        }
        footer {
            background: #1a2e3a;
            color: #e2e8f0;
            padding: 1.5rem;
            text-align: center;
            border-top: 3px solid var(--kyu-gold);
        }
    </style>
</head>
<body>
    <div class="top-bar">
        <a href="login.html" class="back-btn">
            <span>←</span> Back to Login
        </a>
    </div>

    <div class="container">
        <div class="forgot-card">
            <div class="admin-badge">🔐 ADMIN PORTAL</div>
            
            <h2>Forgot Password?</h2>
            <div class="subtitle">Reset your admin password</div>

            <div class="info-box">
                <i>🔒</i> Enter your email address and we'll send you a secure link to reset your password. This link will expire in 1 hour.
            </div>

            <div id="message" class="message"></div>

            <form id="forgot-form">
                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" id="email" placeholder="admin@kirinyagahostels.com" required>
                </div>

                <button type="submit" class="btn-reset" id="reset-btn">Send Reset Link</button>
                <div class="spinner" id="spinner"></div>
            </form>

            <div class="login-link">
                <a href="login.html">Back to Login</a>
            </div>
        </div>
    </div>

    <footer>
        <p>© 2025 Kirinyaga University Hostels. All rights reserved.</p>
    </footer>

    <script>
        (function() {
            const API_BASE_URL = 'https://kirinyaga-hostels-backend.onrender.com/api';
            const form = document.getElementById('forgot-form');
            const email = document.getElementById('email');
            const resetBtn = document.getElementById('reset-btn');
            const spinner = document.getElementById('spinner');
            const messageDiv = document.getElementById('message');

            form.addEventListener('submit', async (e) => {
                e.preventDefault();

                const emailVal = email.value.trim();
                if (!emailVal) return;

                resetBtn.disabled = true;
                spinner.style.display = 'block';
                messageDiv.style.display = 'none';

                try {
                    const res = await fetch(`${API_BASE}/password-reset/`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ email: emailVal })
                    });

                    const data = await res.json();

                    messageDiv.textContent = data.message || 'If an account exists with this email, a reset link has been sent.';
                    messageDiv.className = 'message success';
                    messageDiv.style.display = 'block';
                } catch (err) {
                    messageDiv.textContent = 'Network error. Please try again.';
                    messageDiv.className = 'message error';
                    messageDiv.style.display = 'block';
                } finally {
                    resetBtn.disabled = false;
                    spinner.style.display = 'none';
                }
            });
        })();
    </script>
</body>
</html>
