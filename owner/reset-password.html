<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password - Owner - Kirinyaga Hostels</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' fill='%23006747'/%3E%3Ctext x='10' y='70' fill='%23FFD700' font-size='60' font-family='Arial' font-weight='bold'%3EKyU%3C/text%3E%3C/svg%3E">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, sans-serif;
        }
        :root {
            --kyu-green: #006747;
            --kyu-gold: #FFD700;
            --bg-white: #ffffff;
            --text-primary: #1e293b;
            --text-secondary: #64748b;
            --border-light: #e2e8f0;
            --shadow-md: 0 10px 15px -3px rgba(0,0,0,0.1);
        }
        body.dark-mode {
            --kyu-green: #2ecc71;
            --kyu-gold: #f1c40f;
            --bg-white: #1e293b;
            --text-primary: #f1f5f9;
            --text-secondary: #cbd5e1;
            --border-light: #334155;
            --shadow-md: 0 10px 15px -3px rgba(0,0,0,0.3);
        }
        body {
            background: linear-gradient(145deg, #0b3b2a 0%, #1a4f3a 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            transition: background 0.3s ease;
        }
        .top-bar {
            background: rgba(255,255,255,0.98);
            backdrop-filter: blur(10px);
            padding: 1rem 2rem;
            border-bottom: 3px solid var(--kyu-gold);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        body.dark-mode .top-bar {
            background: rgba(30,41,59,0.98);
        }
        .back-btn {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            text-decoration: none;
            color: var(--kyu-green);
            font-weight: 600;
            padding: 8px 16px;
            border-radius: 40px;
            background: rgba(0,103,71,0.1);
            transition: all 0.3s;
        }
        body.dark-mode .back-btn {
            background: rgba(46,204,113,0.1);
        }
        .back-btn:hover {
            background: var(--kyu-green);
            color: white;
            transform: translateX(-5px);
        }
        .back-btn span {
            font-size: 1.4rem;
        }
        .dark-mode-toggle {
            background: rgba(0,103,71,0.1);
            border: none;
            width: 45px;
            height: 45px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 1.2rem;
            color: var(--kyu-green);
            transition: all 0.3s;
        }
        .dark-mode-toggle:hover {
            background: var(--kyu-green);
            color: white;
            transform: rotate(15deg);
        }
        .container {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 2rem;
        }
        .reset-card {
            background: var(--bg-white);
            border-radius: 40px;
            box-shadow: 0 30px 60px rgba(0,0,0,0.3);
            padding: 3rem;
            width: 100%;
            max-width: 450px;
            transition: background 0.3s ease;
        }
        h2 {
            color: var(--kyu-green);
            text-align: center;
            margin-bottom: 1rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }
        .form-group {
            margin-bottom: 1.5rem;
        }
        label {
            display: block;
            font-weight: 600;
            margin-bottom: 0.5rem;
            color: var(--text-primary);
        }
        input {
            width: 100%;
            padding: 1rem;
            border: 2px solid var(--border-light);
            border-radius: 16px;
            font-size: 1rem;
            transition: border-color 0.3s;
            background: var(--bg-white);
            color: var(--text-primary);
        }
        input:focus {
            outline: none;
            border-color: var(--kyu-green);
        }
        .btn-reset {
            width: 100%;
            padding: 1rem;
            background: var(--kyu-green);
            color: white;
            border: none;
            border-radius: 40px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 1rem;
        }
        .btn-reset:hover {
            transform: translateY(-2px);
            background: #004d33;
        }
        body.dark-mode .btn-reset:hover {
            background: #27ae60;
        }
        .btn-reset:disabled {
            opacity: 0.7;
            cursor: not-allowed;
            transform: none;
        }
        .spinner {
            display: none;
            width: 40px;
            height: 40px;
            margin: 1rem auto;
            border: 4px solid rgba(0,103,71,0.2);
            border-left-color: var(--kyu-green);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        .message {
            padding: 1rem;
            border-radius: 16px;
            margin-bottom: 1.5rem;
            display: none;
            font-size: 0.95rem;
        }
        .message.success {
            background: #c6f6d5;
            color: #22543d;
            border-left: 4px solid #22543d;
        }
        .message.error {
            background: #fed7d7;
            color: #c53030;
            border-left: 4px solid #c53030;
        }
        body.dark-mode .message.success {
            background: #14532d;
            color: #86efac;
        }
        body.dark-mode .message.error {
            background: #7f1a1a;
            color: #fecaca;
        }
        .login-link {
            text-align: center;
            margin-top: 2rem;
        }
        .login-link a {
            color: var(--kyu-green);
            text-decoration: none;
            font-weight: 600;
        }
        footer {
            background: #1a2e3a;
            color: #e2e8f0;
            padding: 1.5rem;
            text-align: center;
            border-top: 3px solid var(--kyu-gold);
        }
        body.dark-mode footer {
            background: #0f172a;
        }
        .password-requirements {
            font-size: 0.8rem;
            color: var(--text-secondary);
            margin-top: 0.5rem;
        }
    </style>
</head>
<body>
    <div class="top-bar">
        <a href="login.html" class="back-btn"><span>←</span> Back to Login</a>
        <button class="dark-mode-toggle" id="darkModeToggle">
            <i class="fas fa-moon"></i>
        </button>
    </div>
    <div class="container">
        <div class="reset-card">
            <h2><i class="fas fa-key"></i> Set New Password</h2>
            <div id="message" class="message"></div>
            <form id="reset-form">
                <div class="form-group">
                    <label>New Password</label>
                    <input type="password" id="new_password" required minlength="8">
                    <div class="password-requirements">
                        <i class="fas fa-info-circle"></i> Password must be at least 8 characters
                    </div>
                </div>
                <div class="form-group">
                    <label>Confirm New Password</label>
                    <input type="password" id="confirm_password" required>
                </div>
                <button type="submit" class="btn-reset" id="reset-btn">Reset Password</button>
                <div class="spinner" id="spinner"></div>
            </form>
            <div class="login-link">
                <a href="login.html">← Back to Login</a>
            </div>
        </div>
    </div>
    <footer>
        <p>© 2025 Kirinyaga University Hostels. All rights reserved.</p>
    </footer>

    <script>
        // ==================== DARK MODE SYNC ====================
        function applyDarkMode() {
            const savedTheme = localStorage.getItem('ownerTheme');
            if (savedTheme === 'dark') {
                document.body.classList.add('dark-mode');
                const toggleBtn = document.getElementById('darkModeToggle');
                if (toggleBtn) toggleBtn.innerHTML = '<i class="fas fa-sun"></i>';
            } else {
                document.body.classList.remove('dark-mode');
                const toggleBtn = document.getElementById('darkModeToggle');
                if (toggleBtn) toggleBtn.innerHTML = '<i class="fas fa-moon"></i>';
            }
        }
        
        applyDarkMode();
        
        window.addEventListener('storage', (e) => {
            if (e.key === 'ownerTheme') applyDarkMode();
        });

        document.getElementById('darkModeToggle').addEventListener('click', () => {
            const isDark = document.body.classList.toggle('dark-mode');
            localStorage.setItem('ownerTheme', isDark ? 'dark' : 'light');
            const toggleBtn = document.getElementById('darkModeToggle');
            toggleBtn.innerHTML = isDark ? '<i class="fas fa-sun"></i>' : '<i class="fas fa-moon"></i>';
        });

        // ==================== PASSWORD RESET FUNCTIONALITY ====================
        const API_BASE = 'https://kirinyaga-hostels-backend.onrender.com/api';
        const urlParams = new URLSearchParams(window.location.search);
        const token = urlParams.get('token');
        const email = urlParams.get('email');

        const form = document.getElementById('reset-form');
        const newPass = document.getElementById('new_password');
        const confirmPass = document.getElementById('confirm_password');
        const resetBtn = document.getElementById('reset-btn');
        const spinner = document.getElementById('spinner');
        const messageDiv = document.getElementById('message');

        if (!token || !email) {
            messageDiv.textContent = 'Invalid or expired password reset link. Please request a new one.';
            messageDiv.className = 'message error';
            messageDiv.style.display = 'block';
            resetBtn.disabled = true;
        }

        form.addEventListener('submit', async (e) => {
            e.preventDefault();

            if (newPass.value !== confirmPass.value) {
                messageDiv.textContent = 'Passwords do not match.';
                messageDiv.className = 'message error';
                messageDiv.style.display = 'block';
                return;
            }

            if (newPass.value.length < 8) {
                messageDiv.textContent = 'Password must be at least 8 characters long.';
                messageDiv.className = 'message error';
                messageDiv.style.display = 'block';
                return;
            }

            resetBtn.disabled = true;
            spinner.style.display = 'block';
            messageDiv.style.display = 'none';

            try {
                const res = await fetch(`${API_BASE}/auth/password-reset/confirm/`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        email: email,
                        token: token,
                        new_password: newPass.value,
                        new_password_confirm: confirmPass.value
                    })
                });
                
                const data = await res.json();
                
                if (res.ok) {
                    messageDiv.textContent = 'Password reset successfully! Redirecting to login...';
                    messageDiv.className = 'message success';
                    messageDiv.style.display = 'block';
                    setTimeout(() => window.location.href = 'login.html', 2000);
                } else {
                    let errorMsg = data.message || data.error || data.detail;
                    if (data.non_field_errors) errorMsg = data.non_field_errors[0];
                    if (data.new_password) errorMsg = data.new_password[0];
                    messageDiv.textContent = errorMsg || 'Password reset failed. Please try again.';
                    messageDiv.className = 'message error';
                    messageDiv.style.display = 'block';
                    resetBtn.disabled = false;
                    spinner.style.display = 'none';
                }
            } catch (err) {
                console.error('Reset error:', err);
                messageDiv.textContent = 'Network error. Please check your connection and try again.';
                messageDiv.className = 'message error';
                messageDiv.style.display = 'block';
                resetBtn.disabled = false;
                spinner.style.display = 'none';
            }
        });
    </script>
</body>
</html>
