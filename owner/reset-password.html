<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password - Owner - Kirinyaga Hostels</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' fill='%23006747'/%3E%3Ctext x='10' y='70' fill='%23FFD700' font-size='60' font-family='Arial' font-weight='bold'%3EKyU%3C/text%3E%3C/svg%3E">
    <style>
        * { margin:0; padding:0; box-sizing:border-box; font-family:'Segoe UI',Roboto,sans-serif; }
        :root { --kyu-green:#006747; --kyu-gold:#FFD700; }
        body { background:linear-gradient(145deg, #0b3b2a 0%, #1a4f3a 100%); min-height:100vh; display:flex; flex-direction:column; }
        .top-bar { background:rgba(255,255,255,0.98); backdrop-filter:blur(10px); padding:1rem 2rem; border-bottom:3px solid var(--kyu-gold); }
        .back-btn { display:inline-flex; align-items:center; gap:10px; text-decoration:none; color:var(--kyu-green); font-weight:600; }
        .container { flex:1; display:flex; justify-content:center; align-items:center; padding:2rem; }
        .reset-card { background:white; border-radius:40px; box-shadow:0 30px 60px rgba(0,0,0,0.3); padding:3rem; width:100%; max-width:450px; }
        h2 { color:var(--kyu-green); text-align:center; margin-bottom:1rem; }
        .form-group { margin-bottom:1.5rem; }
        label { display:block; font-weight:600; margin-bottom:0.5rem; }
        input { width:100%; padding:1rem; border:2px solid #e2e8f0; border-radius:16px; }
        .btn-reset { width:100%; padding:1rem; background:var(--kyu-green); color:white; border:none; border-radius:40px; font-weight:600; cursor:pointer; }
        .spinner { display:none; width:40px; height:40px; margin:1rem auto; border:4px solid rgba(0,0,0,0.1); border-left-color:var(--kyu-green); border-radius:50%; animation:spin 1s linear infinite; }
        .message { padding:1rem; border-radius:16px; margin-bottom:1.5rem; display:none; }
        .message.success { background:#c6f6d5; color:#22543d; }
        .message.error { background:#fed7d7; color:#c53030; }
        .login-link { text-align:center; margin-top:2rem; }
        footer { background:#1a2e3a; color:#e2e8f0; padding:1.5rem; text-align:center; }
    </style>
</head>
<body>
    <div class="top-bar">
        <a href="login.html" class="back-btn"><span>←</span> Back to Login</a>
    </div>
    <div class="container">
        <div class="reset-card">
            <h2>Set New Password</h2>
            <div id="message" class="message"></div>
            <form id="reset-form">
                <div class="form-group">
                    <label>New Password</label>
                    <input type="password" id="new_password" required minlength="8">
                </div>
                <div class="form-group">
                    <label>Confirm New Password</label>
                    <input type="password" id="confirm_password" required>
                </div>
                <button type="submit" class="btn-reset" id="reset-btn">Reset Password</button>
                <div class="spinner" id="spinner"></div>
            </form>
            <div class="login-link">
                <a href="login.html">Back to Login</a>
            </div>
        </div>
    </div>
    <footer>
        <p>© 2025 Kirinyaga University Hostels</p>
    </footer>
    <script>
        (function() {
            const API_BASE = 'https://kirinyaga-hostels-backend.onrender.com/api';
            const urlParams = new URLSearchParams(window.location.search);
            const token = urlParams.get('token');
            const email = urlParams.get('email');

            if (!token || !email) {
                document.getElementById('message').textContent = 'Invalid password reset link.';
                document.getElementById('message').className = 'message error';
                document.getElementById('message').style.display = 'block';
                document.getElementById('reset-btn').disabled = true;
            }

            const form = document.getElementById('reset-form');
            const newPass = document.getElementById('new_password');
            const confirmPass = document.getElementById('confirm_password');
            const resetBtn = document.getElementById('reset-btn');
            const spinner = document.getElementById('spinner');
            const messageDiv = document.getElementById('message');

            form.addEventListener('submit', async (e) => {
                e.preventDefault();

                if (newPass.value !== confirmPass.value) {
                    messageDiv.textContent = 'Passwords do not match.';
                    messageDiv.className = 'message error';
                    messageDiv.style.display = 'block';
                    return;
                }

                resetBtn.disabled = true;
                spinner.style.display = 'block';
                messageDiv.style.display = 'none';

                try {
                    const res = await fetch(`${API_BASE}/password-reset/confirm/`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            email: email,
                            token: token,
                            new_password: newPass.value,
                            new_password_confirm: confirmPass.value
                        })
                    });
                    const data = await res.json();
                    if (res.ok) {
                        messageDiv.textContent = 'Password reset successfully! Redirecting to login...';
                        messageDiv.className = 'message success';
                        messageDiv.style.display = 'block';
                        setTimeout(() => window.location.href = 'login.html', 2000);
                    } else {
                        messageDiv.textContent = data.non_field_errors ? data.non_field_errors[0] : 'Reset failed.';
                        messageDiv.className = 'message error';
                        messageDiv.style.display = 'block';
                        resetBtn.disabled = false;
                        spinner.style.display = 'none';
                    }
                } catch (err) {
                    messageDiv.textContent = 'Network error. Please try again.';
                    messageDiv.className = 'message error';
                    messageDiv.style.display = 'block';
                    resetBtn.disabled = false;
                    spinner.style.display = 'none';
                }
            });
        })();
    </script>
</body>
</html>
