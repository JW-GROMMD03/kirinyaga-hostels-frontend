<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password - Owner - Kirinyaga Hostels</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' fill='%23006747'/%3E%3Ctext x='10' y='70' fill='%23FFD700' font-size='60' font-family='Arial' font-weight='bold'%3EKyU%3C/text%3E%3C/svg%3E">
    <style>
        /* (same styling as student forgot-password page) */
        * { margin:0; padding:0; box-sizing:border-box; font-family:'Segoe UI',Roboto,sans-serif; }
        :root { --kyu-green:#006747; --kyu-gold:#FFD700; }
        body { background:linear-gradient(145deg, #0b3b2a 0%, #1a4f3a 100%); min-height:100vh; display:flex; flex-direction:column; }
        .top-bar { background:rgba(255,255,255,0.98); backdrop-filter:blur(10px); padding:1rem 2rem; border-bottom:3px solid var(--kyu-gold); }
        .back-btn { display:inline-flex; align-items:center; gap:10px; text-decoration:none; color:var(--kyu-green); font-weight:600; }
        .container { flex:1; display:flex; justify-content:center; align-items:center; padding:2rem; }
        .forgot-card { background:white; border-radius:40px; box-shadow:0 30px 60px rgba(0,0,0,0.3); padding:3rem; width:100%; max-width:450px; }
        h2 { color:var(--kyu-green); text-align:center; margin-bottom:1rem; }
        .info-text { background:#e8f4fd; padding:1rem; border-radius:16px; margin-bottom:2rem; font-size:0.95rem; }
        .form-group { margin-bottom:1.5rem; }
        label { display:block; font-weight:600; margin-bottom:0.5rem; }
        input { width:100%; padding:1rem; border:2px solid #e2e8f0; border-radius:16px; }
        .btn-reset { width:100%; padding:1rem; background:var(--kyu-green); color:white; border:none; border-radius:40px; font-weight:600; cursor:pointer; }
        .spinner { display:none; width:40px; height:40px; margin:1rem auto; border:4px solid rgba(0,0,0,0.1); border-left-color:var(--kyu-green); border-radius:50%; animation:spin 1s linear infinite; }
        .message { padding:1rem; border-radius:16px; margin-bottom:1.5rem; display:none; }
        .message.success { background:#c6f6d5; color:#22543d; }
        .message.error { background:#fed7d7; color:#c53030; }
        .login-link { text-align:center; margin-top:2rem; }
        .login-link a { color:var(--kyu-green); text-decoration:none; font-weight:600; }
        footer { background:#1a2e3a; color:#e2e8f0; padding:1.5rem; text-align:center; }
    </style>
</head>
<body>
    <div class="top-bar">
        <a href="login.html" class="back-btn"><span>←</span> Back to Login</a>
    </div>
    <div class="container">
        <div class="forgot-card">
            <h2>Forgot Password?</h2>
            <div class="info-text">
                <i>🔐</i> Enter your email address and we'll send you a link to reset your password.
            </div>
            <div id="message" class="message"></div>
            <form id="forgot-form">
                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" id="email" required>
                </div>
                <button type="submit" class="btn-reset" id="reset-btn">Send Reset Link</button>
                <div class="spinner" id="spinner"></div>
            </form>
            <div class="login-link">
                Remember your password? <a href="login.html">Log in</a>
            </div>
        </div>
    </div>
    <footer>
        <p>© 2025 Kirinyaga University Hostels</p>
    </footer>
    <script src="theme.js"></script>
    <script>
        (function() {
            const API_BASE = 'https://kirinyaga-hostels-backend.onrender.com/api';
            const form = document.getElementById('forgot-form');
            const email = document.getElementById('email');
            const resetBtn = document.getElementById('reset-btn');
            const spinner = document.getElementById('spinner');
            const messageDiv = document.getElementById('message');

            form.addEventListener('submit', async (e) => {
                e.preventDefault();
                const emailVal = email.value.trim();
                if (!emailVal) return;

                resetBtn.disabled = true;
                spinner.style.display = 'block';
                messageDiv.style.display = 'none';

                try {
                    const res = await fetch(`${API_BASE}/password-reset/`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ email: emailVal })
                    });
                    const data = await res.json();
                    messageDiv.textContent = data.message || 'If an account exists, a reset link has been sent.';
                    messageDiv.className = 'message success';
                    messageDiv.style.display = 'block';
                } catch (err) {
                    messageDiv.textContent = 'Network error. Please try again.';
                    messageDiv.className = 'message error';
                    messageDiv.style.display = 'block';
                } finally {
                    resetBtn.disabled = false;
                    spinner.style.display = 'none';
                }
            });
        })();
    </script>
</body>
</html>
