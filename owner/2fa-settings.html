<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2FA Settings - Kirinyaga Hostels</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' fill='%23006747'/%3E%3Ctext x='10' y='70' fill='%23FFD700' font-size='60' font-family='Arial' font-weight='bold'%3EKyU%3C/text%3E%3C/svg%3E">
    <style>
        /* (same base styles as dashboard, plus specific for this page) */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, sans-serif;
        }
        :root {
            --kyu-green: #006747;
            --kyu-gold: #FFD700;
        }
        body {
            background: linear-gradient(145deg, #0b3b2a 0%, #1a4f3a 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        .top-bar {
            background: rgba(255,255,255,0.98);
            backdrop-filter: blur(10px);
            padding: 1rem 2rem;
            box-shadow: 0 4px 20px rgba(0,0,0,0.15);
            border-bottom: 3px solid var(--kyu-gold);
            display: flex;
            align-items: center;
            gap: 20px;
        }
        .back-btn {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            text-decoration: none;
            color: var(--kyu-green);
            font-weight: 600;
            padding: 8px 16px;
            border-radius: 40px;
            background: rgba(0,103,71,0.1);
            transition: all 0.3s;
        }
        .back-btn:hover {
            background: var(--kyu-green);
            color: white;
            transform: translateX(-5px);
        }
        .container {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 2rem;
        }
        .settings-card {
            background: white;
            border-radius: 40px;
            box-shadow: 0 30px 60px rgba(0,0,0,0.3);
            padding: 3rem;
            width: 100%;
            max-width: 500px;
        }
        h2 {
            color: var(--kyu-green);
            margin-bottom: 1.5rem;
            text-align: center;
        }
        .info-box {
            background: #e8f4fd;
            border-left: 5px solid var(--kyu-gold);
            padding: 1rem;
            border-radius: 16px;
            margin-bottom: 2rem;
        }
        .status-box {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1.5rem;
            background: #f7fafc;
            border-radius: 20px;
            margin-bottom: 2rem;
        }
        .status-label {
            font-weight: 600;
            color: #333;
        }
        .status-value {
            font-weight: 700;
            color: var(--kyu-green);
        }
        .btn {
            background: var(--kyu-green);
            color: white;
            border: none;
            padding: 0.8rem 1.5rem;
            border-radius: 40px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.3s;
        }
        .btn:hover {
            background: #004d33;
        }
        .btn-danger {
            background: #e53e3e;
        }
        .btn-danger:hover {
            background: #c53030;
        }
        .form-group {
            margin-bottom: 1.5rem;
        }
        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 600;
        }
        .form-group input {
            width: 100%;
            padding: 1rem;
            border: 2px solid #e2e8f0;
            border-radius: 16px;
            font-size: 1rem;
            letter-spacing: 2px;
            text-align: center;
        }
        .form-group input:focus {
            outline: none;
            border-color: var(--kyu-green);
        }
        .message {
            padding: 1rem;
            border-radius: 16px;
            margin-bottom: 2rem;
            display: none;
        }
        .message.success {
            background: #c6f6d5;
            color: #22543d;
            border-left: 5px solid #22543d;
        }
        .message.error {
            background: #fed7d7;
            color: #c53030;
            border-left: 5px solid #c53030;
        }
        .spinner {
            display: none;
            width: 40px;
            height: 40px;
            margin: 20px auto;
            border: 4px solid rgba(0,103,71,0.2);
            border-left-color: var(--kyu-green);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="top-bar">
        <a href="dashboard.html" class="back-btn"><span>←</span> Back to Dashboard</a>
    </div>
    <div class="container">
        <div class="settings-card">
            <h2>Two‑Factor Authentication</h2>
            <div class="info-box">
                <i>🔐</i> Add an extra layer of security to your account. When enabled, you'll need a 6‑digit code sent to your email in addition to your password.
            </div>

            <div id="message" class="message"></div>

            <div class="status-box">
                <span class="status-label">Current Status:</span>
                <span class="status-value" id="statusText">Loading...</span>
            </div>

            <div id="actionArea">
                <!-- dynamic content based on current status -->
            </div>
        </div>
    </div>

    <script>
        (function() {
            const API_BASE = 'https://kirinyaga-hostels-backend.onrender.com/api';
            const accessToken = sessionStorage.getItem('accessToken');
            if (!accessToken) window.location.href = 'login.html';

            const messageDiv = document.getElementById('message');
            const statusSpan = document.getElementById('statusText');
            const actionArea = document.getElementById('actionArea');

            async function fetchStatus() {
                try {
                    const res = await fetch(`${API_BASE}/2fa/status/`, {
                        headers: { 'Authorization': `Bearer ${accessToken}` }
                    });
                    const data = await res.json();
                    const isEnabled = data.is_2fa_enabled;
                    statusSpan.textContent = isEnabled ? 'Enabled' : 'Disabled';
                    renderAction(isEnabled);
                } catch (e) {
                    showMessage('Failed to load status', 'error');
                }
            }

            function showMessage(text, type) {
                messageDiv.textContent = text;
                messageDiv.className = `message ${type}`;
                messageDiv.style.display = 'block';
            }

            function renderAction(isEnabled) {
                if (isEnabled) {
                    actionArea.innerHTML = `
                        <p style="margin-bottom:1rem;">To disable 2FA, click below and enter the code sent to your email.</p>
                        <button id="disableBtn" class="btn btn-danger">Disable 2FA</button>
                        <div id="disableOtpSection" style="display:none; margin-top:1.5rem;">
                            <div class="form-group">
                                <label>Enter 6-digit code</label>
                                <input type="text" id="otpCode" maxlength="6" pattern="[0-9]{6}" inputmode="numeric">
                            </div>
                            <button id="confirmDisableBtn" class="btn btn-danger">Confirm Disable</button>
                        </div>
                    `;
                    document.getElementById('disableBtn').addEventListener('click', requestDisable);
                } else {
                    actionArea.innerHTML = `
                        <p style="margin-bottom:1rem;">Enable two-factor authentication to secure your account.</p>
                        <button id="enableBtn" class="btn">Enable 2FA</button>
                        <div id="enableOtpSection" style="display:none; margin-top:1.5rem;">
                            <div class="form-group">
                                <label>Enter 6-digit code</label>
                                <input type="text" id="otpCode" maxlength="6" pattern="[0-9]{6}" inputmode="numeric">
                            </div>
                            <button id="confirmEnableBtn" class="btn">Confirm Enable</button>
                        </div>
                    `;
                    document.getElementById('enableBtn').addEventListener('click', requestEnable);
                }
            }

            async function requestEnable() {
                try {
                    const res = await fetch(`${API_BASE}/2fa/enable-request/`, {
                        method: 'POST',
                        headers: { 'Authorization': `Bearer ${accessToken}`, 'Content-Type': 'application/json' }
                    });
                    const data = await res.json();
                    if (res.ok) {
                        showMessage('OTP sent to your email. Enter it below.', 'success');
                        document.getElementById('enableBtn').style.display = 'none';
                        document.getElementById('enableOtpSection').style.display = 'block';
                        document.getElementById('confirmEnableBtn').addEventListener('click', confirmEnable);
                    } else {
                        showMessage(data.message || 'Failed to request OTP', 'error');
                    }
                } catch (e) {
                    showMessage('Network error', 'error');
                }
            }

            async function confirmEnable() {
                const otp = document.getElementById('otpCode').value.trim();
                if (!otp || otp.length !== 6 || !/^\d+$/.test(otp)) {
                    showMessage('Enter a valid 6-digit code', 'error');
                    return;
                }
                try {
                    const res = await fetch(`${API_BASE}/2fa/enable-confirm/`, {
                        method: 'POST',
                        headers: { 'Authorization': `Bearer ${accessToken}`, 'Content-Type': 'application/json' },
                        body: JSON.stringify({ otp })
                    });
                    const data = await res.json();
                    if (res.ok) {
                        showMessage('2FA enabled successfully!', 'success');
                        fetchStatus();
                    } else {
                        if (data.otp) showMessage(data.otp[0], 'error');
                        else showMessage(data.message || 'Verification failed', 'error');
                    }
                } catch (e) {
                    showMessage('Network error', 'error');
                }
            }

            async function requestDisable() {
                try {
                    const res = await fetch(`${API_BASE}/2fa/disable-request/`, {
                        method: 'POST',
                        headers: { 'Authorization': `Bearer ${accessToken}`, 'Content-Type': 'application/json' }
                    });
                    const data = await res.json();
                    if (res.ok) {
                        showMessage('OTP sent to your email. Enter it below to confirm disable.', 'success');
                        document.getElementById('disableBtn').style.display = 'none';
                        document.getElementById('disableOtpSection').style.display = 'block';
                        document.getElementById('confirmDisableBtn').addEventListener('click', confirmDisable);
                    } else {
                        showMessage(data.message || 'Failed to request OTP', 'error');
                    }
                } catch (e) {
                    showMessage('Network error', 'error');
                }
            }

            async function confirmDisable() {
                const otp = document.getElementById('otpCode').value.trim();
                if (!otp || otp.length !== 6 || !/^\d+$/.test(otp)) {
                    showMessage('Enter a valid 6-digit code', 'error');
                    return;
                }
                try {
                    const res = await fetch(`${API_BASE}/2fa/disable-confirm/`, {
                        method: 'POST',
                        headers: { 'Authorization': `Bearer ${accessToken}`, 'Content-Type': 'application/json' },
                        body: JSON.stringify({ otp })
                    });
                    const data = await res.json();
                    if (res.ok) {
                        showMessage('2FA disabled successfully!', 'success');
                        fetchStatus();
                    } else {
                        if (data.otp) showMessage(data.otp[0], 'error');
                        else showMessage(data.message || 'Verification failed', 'error');
                    }
                } catch (e) {
                    showMessage('Network error', 'error');
                }
            }

            fetchStatus();
        })();
    </script>
</body>
</html>
