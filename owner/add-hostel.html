<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Hostel - Kirinyaga Hostels</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' fill='%23006747'/%3E%3Ctext x='10' y='70' fill='%23FFD700' font-size='60' font-family='Arial' font-weight='bold'%3EKyU%3C/text%3E%3C/svg%3E">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, sans-serif;
        }
        :root {
            --kyu-green: #006747;
            --kyu-gold: #FFD700;
        }
        body {
            background: linear-gradient(145deg, #0b3b2a 0%, #1a4f3a 100%);
            min-height: 100vh;
        }
        .top-bar {
            background: rgba(255,255,255,0.98);
            backdrop-filter: blur(10px);
            padding: 1rem 2rem;
            box-shadow: 0 4px 20px rgba(0,0,0,0.15);
            border-bottom: 3px solid var(--kyu-gold);
            display: flex;
            align-items: center;
            gap: 20px;
        }
        .back-btn {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            text-decoration: none;
            color: var(--kyu-green);
            font-weight: 600;
            padding: 8px 16px;
            border-radius: 40px;
            background: rgba(0,103,71,0.1);
            transition: all 0.3s;
        }
        .back-btn:hover {
            background: var(--kyu-green);
            color: white;
            transform: translateX(-5px);
        }
        .back-btn span {
            font-size: 1.4rem;
        }
        .container {
            max-width: 1000px;
            margin: 2rem auto;
            padding: 0 2rem;
        }
        .form-card {
            background: white;
            border-radius: 40px;
            box-shadow: 0 30px 60px rgba(0,0,0,0.3);
            padding: 3rem;
        }
        h1 {
            color: var(--kyu-green);
            font-size: 2rem;
            margin-bottom: 2rem;
            text-align: center;
        }
        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1.5rem;
            margin-bottom: 1.5rem;
        }
        .form-group {
            margin-bottom: 1.5rem;
        }
        label {
            display: block;
            font-weight: 600;
            margin-bottom: 0.5rem;
            color: #333;
        }
        input, select, textarea {
            width: 100%;
            padding: 1rem;
            border: 2px solid #e2e8f0;
            border-radius: 16px;
            font-size: 1rem;
            transition: border-color 0.3s;
        }
        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: var(--kyu-green);
        }
        #map {
            height: 300px;
            width: 100%;
            border-radius: 16px;
            margin-bottom: 1rem;
            border: 2px solid #e2e8f0;
            z-index: 1;
        }
        .map-controls {
            margin-bottom: 1rem;
        }
        .photo-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 1rem;
            margin-bottom: 1.5rem;
        }
        .photo-item {
            background: #f7fafc;
            border: 2px dashed #e2e8f0;
            border-radius: 16px;
            padding: 1rem;
            text-align: center;
        }
        .photo-item input[type="file"] {
            margin-bottom: 0.5rem;
            font-size: 0.8rem;
            width: 100%;
        }
        .photo-item input[type="text"] {
            font-size: 0.9rem;
            padding: 0.5rem;
        }
        .amenities-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 1rem;
            margin: 1rem 0;
        }
        .amenity-check {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            background: #f7fafc;
            padding: 0.5rem 1rem;
            border-radius: 30px;
            font-size: 0.9rem;
        }
        .btn-save {
            background: var(--kyu-green);
            color: white;
            border: none;
            padding: 1rem 3rem;
            border-radius: 40px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            width: 100%;
            margin-top: 2rem;
        }
        .btn-save:hover {
            background: #004d33;
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(0,103,71,0.3);
        }
        .btn-save:disabled {
            opacity: 0.7;
            cursor: not-allowed;
        }
        .spinner {
            display: none;
            width: 40px;
            height: 40px;
            margin: 1rem auto;
            border: 4px solid rgba(0,0,0,0.1);
            border-left-color: var(--kyu-green);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        .message {
            padding: 1rem;
            border-radius: 16px;
            margin-bottom: 1.5rem;
            display: none;
            white-space: pre-wrap;
        }
        .message.success {
            background: #c6f6d5;
            color: #22543d;
            border-left: 5px solid #22543d;
        }
        .message.error {
            background: #fed7d7;
            color: #c53030;
            border-left: 5px solid #c53030;
        }
        .loading-amenities {
            text-align: center;
            padding: 2rem;
            color: #666;
        }
        .distance-display {
            font-size: 1rem;
            margin-top: 0.5rem;
            font-weight: 500;
        }
        footer {
            background: #1a2e3a;
            color: #e2e8f0;
            padding: 2rem;
            text-align: center;
            margin-top: 3rem;
        }
    </style>
</head>
<body>
    <div class="top-bar">
        <a href="hostels.html" class="back-btn">
            <span>←</span> Back to My Hostels
        </a>
    </div>

    <div class="container">
        <div class="form-card">
            <h1>Add New Hostel</h1>
            
            <div id="message" class="message"></div>
            
            <form id="addHostelForm">
                <div class="form-row">
                    <div class="form-group">
                        <label>Hostel Name</label>
                        <input type="text" id="name" placeholder="e.g., Green Haven Hostel" required>
                    </div>
                    <div class="form-group">
                        <label>Room Type</label>
                        <select id="roomType" required>
                            <option value="bedsitter">Bedsitter</option>
                            <option value="single">Single Room</option>
                            <option value="one_bedroom">One Bedroom</option>
                            <option value="two_bedroom">Two Bedroom</option>
                        </select>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label>Price (KES/month)</label>
                        <input type="number" id="price" min="0" step="100" placeholder="e.g., 5000" required>
                    </div>
                    <div class="form-group">
                        <label>Deposit (KES)</label>
                        <input type="number" id="deposit" min="0" value="0" placeholder="Optional deposit amount">
                    </div>
                </div>

                <div class="form-group">
                    <label>Description</label>
                    <textarea id="description" rows="4" placeholder="Describe your hostel, rules, nearby amenities, etc." required></textarea>
                </div>

                <div class="form-group">
                    <label>Address</label>
                    <input type="text" id="address" placeholder="e.g., Kutus, near the market" required>
                </div>

                <div class="form-group">
                    <label>Google Maps Location (drag the marker to set exact location)</label>
                    <div id="map"></div>
                    <div class="map-controls">
                        <input type="text" id="location-search" placeholder="Search for a location..." style="width:100%; padding:0.8rem; border:2px solid #e2e8f0; border-radius:30px; margin-top:0.5rem;">
                    </div>
                    <input type="hidden" id="lat">
                    <input type="hidden" id="lng">
                    <div class="distance-display">
                        <strong>Distance to university:</strong> <span id="distance">not calculated</span>
                    </div>
                </div>

                <div class="form-group">
                    <label>Amenities (select all that apply)</label>
                    <div id="amenitiesContainer">
                        <div class="loading-amenities" id="amenitiesLoading">Loading amenities...</div>
                        <div class="amenities-grid" id="amenitiesList" style="display: none;"></div>
                    </div>
                </div>

                <div class="form-group">
                    <label>Other Amenities (comma separated, e.g., CCTV, Study Room, Parking)</label>
                    <input type="text" id="otherAmenities" placeholder="List any other amenities not in the list above">
                </div>

                <div class="form-group">
                    <label>Photos (up to 6 - you can add a description for each)</label>
                    <div class="photo-grid" id="photoGrid">
                        <!-- Generated by JavaScript -->
                    </div>
                </div>

                <button type="submit" class="btn-save" id="submitBtn">Add Hostel</button>
                <div class="spinner" id="spinner"></div>
            </form>
        </div>
    </div>

    <footer>
        <p>© 2025 Kirinyaga University Hostels. All rights reserved.</p>
    </footer>
    
    <script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyBizaLbe_k0W-xEOBEhkNFcwZPC8eFl-OQ&libraries=places&callback=initMap&v=weekly" async defer></script>
    <script>
    (function() {
        const API_BASE = 'https://kirinyaga-hostels-backend.onrender.com/api';
        const token = sessionStorage.getItem('accessToken');
        if (!token) window.location.href = 'login.html';

        // DOM Elements
        const form = document.getElementById('addHostelForm');
        const submitBtn = document.getElementById('submitBtn');
        const spinner = document.getElementById('spinner');
        const messageDiv = document.getElementById('message');
        const photoGrid = document.getElementById('photoGrid');
        const amenitiesList = document.getElementById('amenitiesList');
        const amenitiesLoading = document.getElementById('amenitiesLoading');
        const locationSearch = document.getElementById('location-search');
        
        // Map variables
        let map, marker, searchBox;
        const universityLocation = { lat: -0.4975, lng: 37.3214 };

        // Fallback static amenities (in case backend fails)
        const fallbackAmenities = [
            { id: 1, name: 'WiFi' },
            { id: 2, name: 'Clean Water' },
            { id: 3, name: 'Shower' },
            { id: 4, name: 'Hot Shower' },
            { id: 5, name: '24/7 Security' },
            { id: 6, name: 'Parking' },
            { id: 7, name: 'Electricity 24/7' },
            { id: 8, name: 'Study Room' },
            { id: 9, name: 'Kitchen' },
            { id: 10, name: 'Furnished' },
            { id: 11, name: 'Wardrobe' },
            { id: 12, name: 'Bed' },
            { id: 13, name: 'TV' },
            { id: 14, name: 'Fridge' },
            { id: 15, name: 'Balcony' },
            { id: 16, name: 'Emergency Alert' }
        ];

        window.gm_authFailure = function() {
            document.getElementById('map').innerHTML = '<div style="padding:20px; text-align:center; background:#fee2e2; border-radius:16px;">❌ Google Maps failed to load. Please check your API key or internet connection.</div>';
        };

        function initPhotoFields() {
            let html = '';
            for (let i = 1; i <= 6; i++) {
                html += `
                    <div class="photo-item">
                        <input type="file" id="photo${i}" accept="image/*">
                        <input type="text" id="photo${i}_desc" placeholder="Description (e.g., Kitchen, Living room)">
                    </div>
                `;
            }
            photoGrid.innerHTML = html;
        }

        async function loadAmenities() {
            console.log('Attempting to load amenities from backend...');
            try {
                const res = await fetch(`${API_BASE}/hostels/amenities/`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                console.log('Amenities response status:', res.status);
                if (!res.ok) throw new Error(`HTTP error ${res.status}`);
                const data = await res.json();
                console.log('Amenities data from backend:', data);
                
                amenitiesLoading.style.display = 'none';
                
                // Handle paginated response (data.results) or direct array
                let amenities = Array.isArray(data) ? data : (data.results || []);
                
                if (amenities.length === 0) {
                    console.warn('Backend returned empty amenities list, using fallback.');
                    renderAmenities(fallbackAmenities);
                } else {
                    renderAmenities(amenities);
                }
            } catch (e) {
                console.error('Error loading amenities from backend:', e);
                amenitiesLoading.textContent = 'Failed to load from server, using default list.';
                setTimeout(() => {
                    amenitiesLoading.style.display = 'none';
                    renderAmenities(fallbackAmenities);
                }, 1500);
            }
        }

        function renderAmenities(amenities) {
            let html = '';
            amenities.forEach(a => {
                html += `<label class="amenity-check"><input type="checkbox" name="amenities[]" value="${a.id}"> ${a.name}</label>`;
            });
            amenitiesList.innerHTML = html;
            amenitiesList.style.display = 'grid';
        }

        window.initMap = function() {
            map = new google.maps.Map(document.getElementById('map'), {
                center: universityLocation,
                zoom: 12,
            });
            marker = new google.maps.Marker({
                position: universityLocation,
                map: map,
                draggable: true,
            });
            marker.addListener('dragend', function() {
                const pos = marker.getPosition();
                document.getElementById('lat').value = pos.lat();
                document.getElementById('lng').value = pos.lng();
                calculateDistance(pos.lat(), pos.lng());
            });
            map.addListener('click', function(e) {
                marker.setPosition(e.latLng);
                document.getElementById('lat').value = e.latLng.lat();
                document.getElementById('lng').value = e.latLng.lng();
                calculateDistance(e.latLng.lat(), e.latLng.lng());
            });
            const input = locationSearch;
            searchBox = new google.maps.places.SearchBox(input);
            map.controls[google.maps.ControlPosition.TOP_LEFT].push(input);
            map.addListener('bounds_changed', () => searchBox.setBounds(map.getBounds()));
            searchBox.addListener('places_changed', function() {
                const places = searchBox.getPlaces();
                if (places.length === 0) return;
                const place = places[0];
                if (!place.geometry) return;
                marker.setPosition(place.geometry.location);
                document.getElementById('lat').value = place.geometry.location.lat();
                document.getElementById('lng').value = place.geometry.location.lng();
                calculateDistance(place.geometry.location.lat(), place.geometry.location.lng());
                if (place.geometry.viewport) {
                    map.fitBounds(place.geometry.viewport);
                } else {
                    map.setCenter(place.geometry.location);
                    map.setZoom(15);
                }
            });
        };

        function calculateDistance(lat, lng) {
            const R = 6371;
            const dLat = (universityLocation.lat - lat) * Math.PI / 180;
            const dLon = (universityLocation.lng - lng) * Math.PI / 180;
            const a = Math.sin(dLat/2)**2 + Math.cos(lat * Math.PI/180) * Math.cos(universityLocation.lat * Math.PI/180) * Math.sin(dLon/2)**2;
            const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
            document.getElementById('distance').textContent = (R * c).toFixed(2) + ' km';
        }

        function showMessage(text, type) {
            messageDiv.textContent = text;
            messageDiv.className = `message ${type}`;
            messageDiv.style.display = 'block';
            if (type === 'success') setTimeout(() => messageDiv.style.display = 'none', 5000);
        }

        function setLoading(isLoading) {
            submitBtn.disabled = isLoading;
            spinner.style.display = isLoading ? 'block' : 'none';
            submitBtn.textContent = isLoading ? 'Adding Hostel...' : 'Add Hostel';
        }

        form.addEventListener('submit', async (e) => {
            e.preventDefault();

            const name = document.getElementById('name').value.trim();
            const price = document.getElementById('price').value;
            const address = document.getElementById('address').value.trim();
            const description = document.getElementById('description').value.trim();
            const lat = document.getElementById('lat').value;
            const lng = document.getElementById('lng').value;

            if (!name) return showMessage('Please enter a hostel name', 'error');
            if (!price || price <= 0) return showMessage('Please enter a valid price', 'error');
            if (!description) return showMessage('Please enter a description', 'error');
            if (!address) return showMessage('Please enter an address', 'error');
            if (!lat || !lng) return showMessage('Please set the location on the map', 'error');

            setLoading(true);
            messageDiv.style.display = 'none';

            const formData = new FormData();
            formData.append('name', name);
            formData.append('room_type', document.getElementById('roomType').value);
            formData.append('price', price);
            formData.append('deposit', document.getElementById('deposit').value || 0);
            formData.append('description', description);
            formData.append('address', address);
            formData.append('location_lat', lat);
            formData.append('location_lng', lng);
            const distanceText = document.getElementById('distance').textContent;
            if (distanceText !== 'not calculated') {
                formData.append('distance_to_university', parseFloat(distanceText));
            }
            
            // Append amenities with the correct key 'amenities[]'
            document.querySelectorAll('#amenitiesList input:checked').forEach(cb => {
                formData.append('amenities[]', cb.value);
            });
            
            formData.append('other_amenities', document.getElementById('otherAmenities').value);
            
            // Append photos
            for (let i = 1; i <= 6; i++) {
                const fileInput = document.getElementById(`photo${i}`);
                if (fileInput.files[0]) {
                    formData.append(`photo${i}`, fileInput.files[0]);
                    formData.append(`photo${i}_desc`, document.getElementById(`photo${i}_desc`).value || '');
                }
            }

            // Log FormData entries for debugging
            console.log('FormData entries:');
            for (let pair of formData.entries()) {
                if (pair[0].startsWith('photo')) {
                    console.log(pair[0], pair[1] instanceof File ? `File: ${pair[1].name}` : pair[1]);
                } else {
                    console.log(pair[0], pair[1]);
                }
            }

            try {
                const res = await fetch(`${API_BASE}/hostels/create/`, {
                    method: 'POST',
                    headers: { 'Authorization': `Bearer ${token}` },
                    body: formData
                });

                // Get response as text first
                const responseText = await res.text();
                console.log('Raw response:', responseText);
                console.log('Response status:', res.status);

                let data;
                try {
                    data = JSON.parse(responseText);
                } catch (jsonError) {
                    // If it's not JSON, show the raw text as error
                    showMessage('Server returned non-JSON response. Status: ' + res.status + '\n' + responseText.substring(0, 500), 'error');
                    setLoading(false);
                    return;
                }

                // Check if response is successful OR if it's the specific Supabase error (the hostel was still created)
                const isSupabaseError = data && typeof data === 'object' && data.error && data.error.includes("from_");

                if (res.ok || isSupabaseError) {
                    showMessage('Hostel added successfully! It will be reviewed by admin.', 'success');
                    form.reset();
                    if (marker) marker.setPosition(universityLocation);
                    document.getElementById('lat').value = '';
                    document.getElementById('lng').value = '';
                    document.getElementById('distance').textContent = 'not calculated';
                    setTimeout(() => window.location.href = 'hostels.html', 2000);
                } else {
                    let errorMsg = '';
                    if (typeof data === 'object') {
                        if (data.detail) errorMsg = data.detail;
                        else if (data.message) errorMsg = data.message;
                        else if (data.non_field_errors) errorMsg = data.non_field_errors[0];
                        else {
                            // Collect all field errors
                            for (const [field, errors] of Object.entries(data)) {
                                if (Array.isArray(errors)) {
                                    errorMsg += `${field}: ${errors.join(', ')}\n`;
                                } else if (typeof errors === 'string') {
                                    errorMsg += `${field}: ${errors}\n`;
                                }
                            }
                        }
                    }
                    if (!errorMsg) errorMsg = JSON.stringify(data, null, 2);
                    showMessage(errorMsg, 'error');
                    setLoading(false);
                }
            } catch (e) {
                console.error('Fetch error:', e);
                showMessage('Network error. Please try again.', 'error');
                setLoading(false);
            }
        });

        initPhotoFields();
        loadAmenities();
    })();
    </script>
    
</body>
</html>
